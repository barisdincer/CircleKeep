name: Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        default: "v1.0.0"
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release signing key
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.CIRCLEKEEP_RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.CIRCLEKEEP_RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.CIRCLEKEEP_RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.CIRCLEKEEP_RELEASE_KEY_PASSWORD }}
        shell: bash
        run: |
          missing=0
          for name in RELEASE_KEYSTORE_BASE64 RELEASE_STORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: ${name/RELEASE_/CIRCLEKEEP_RELEASE_}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/circlekeep-signing"
          KEYSTORE_PATH="$RUNNER_TEMP/circlekeep-signing/circlekeep-release.jks"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"

          {
            echo "CIRCLEKEEP_RELEASE_STORE_FILE=$KEYSTORE_PATH"
            echo "CIRCLEKEEP_RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD"
            echo "CIRCLEKEEP_RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS"
            echo "CIRCLEKEEP_RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Test
        run: ./gradlew testDebugUnitTest

      - name: Build signed release APK
        run: ./gradlew assembleRelease

      - name: Verify release APK signature
        run: $ANDROID_HOME/build-tools/36.0.0/apksigner verify --print-certs app/build/outputs/apk/release/app-release.apk

      - name: Prepare release files
        id: release_files
        shell: bash
        run: |
          TAG_NAME="${{ github.event.inputs.tag }}"
          PRERELEASE="${{ github.event.inputs.prerelease }}"

          mkdir -p release
          APK_PATH="release/CircleKeep-${TAG_NAME}-release.apk"
          cp app/build/outputs/apk/release/app-release.apk "$APK_PATH"
          sha256sum "$APK_PATH" > "${APK_PATH}.sha256"

          {
            echo "tag_name=$TAG_NAME"
            echo "apk_path=$APK_PATH"
            echo "checksum_path=${APK_PATH}.sha256"
            echo "prerelease=$PRERELEASE"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure release tag exists
        shell: bash
        run: |
          TAG_NAME="${{ steps.release_files.outputs.tag_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists."
          else
            git tag "$TAG_NAME" "$GITHUB_SHA"
            git push origin "$TAG_NAME"
          fi

      - name: Create release notes
        shell: bash
        run: |
          printf 'CircleKeep APK built from commit %s.\n\nThis is a release APK signed with the CircleKeep release key.\n' "$GITHUB_SHA" > release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release_files.outputs.tag_name }}
          APK_PATH: ${{ steps.release_files.outputs.apk_path }}
          CHECKSUM_PATH: ${{ steps.release_files.outputs.checksum_path }}
          PRERELEASE: ${{ steps.release_files.outputs.prerelease }}
        shell: bash
        run: |
          RELEASE_FLAGS=()
          if [ "$PRERELEASE" = "true" ]; then
            RELEASE_FLAGS+=(--prerelease)
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$APK_PATH" "$CHECKSUM_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$APK_PATH" "$CHECKSUM_PATH" \
              --title "CircleKeep $TAG_NAME" \
              --notes-file release-notes.md \
              "${RELEASE_FLAGS[@]}"
          fi
